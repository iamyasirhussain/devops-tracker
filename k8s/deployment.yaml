apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker              # what this Deployment is called
spec:
  replicas: 3                # ← I want 2 pods. Always.
  selector:
    matchLabels:
      app: tracker           # "the pods I manage wear this label"
  template:                  # ← the cookie-cutter for each pod
    metadata:
      labels:
        app: tracker         # each pod gets this label (must match above)
    spec:
      containers:
      - name: tracker
        image: ghcr.io/iamyasirhussain/devops-tracker:8d01e2a200661200b7cf71152482f34659cab87d
        envFrom:
        - configMapRef:
            name: tracker-config    # inject ALL keys as env vars
        resources:
          requests:           # what I need to be scheduled
            cpu: 50m          # 50 millicores = 0.05 of a core
            memory: 64Mi
          limits:             # my hard ceiling
            cpu: 200m
            memory: 128Mi
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /healthz     # "am I broken?" — no dependencies
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready       # "can I serve?" — checks Redis
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 5
