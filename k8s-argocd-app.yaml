apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tracker
  namespace: argocd
spec:
  project: default

  # WHERE to look
  source:
    repoURL: https://github.com/iamyasirhussain/devops-tracker.git
    targetRevision: main
    path: k8s              # ← the folder with your yaml

  # WHERE to put it
  destination:
    server: https://kubernetes.default.svc
    namespace: tracker

  syncPolicy:
    automated:
      prune: true          # delete stuff removed from Git
      selfHeal: true       # undo hand-edits to the cluster
