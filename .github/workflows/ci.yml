# The name shown on Github's Actions tab
name: CI

# When should the robot wake up?
on:
  push:
    branches: [main]  # every push to main
  pull_request:
    branches: [main] # every PR aimed at main

jobs:
  build:
    # Which machine? Github gives us a fresh, empty ubuntu box.
    runs-on: ubuntu-latest

    # Start a Redis for the tests to talk to.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    # Least privilege: read the code, write packages. Nothing more.
    permissions:
      contents: write
      packages: write    

    steps:
      # The box is empty - it gives us a fresh, empty ubuntu box.
      - name: Check out the code
        uses: actions/checkout@v5
 

      # It has no python either. Install it.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"


      # install our 3 libraries from the requirements.txt
      - name: install dependancies
        run: pip install -r requirements.txt


      # spell-check the code: catches unused imports, undefined names, etc
      - name: Lint with ruff
        run: ruff check .


      # Real tests: prove the app behaves, not just that it starts.
      - name: Run Tests
        env:
          REDIS_HOST: localhost
        run: pytest -v



      # Set up the modern builder (needed for multi-arch).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

    
      # Log in to Github's registry using the auto-privided short-lived token.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{  github.actor  }}
          password: ${{  secrets.GITHUB_TOKEN  }}
      # Build for both architectures and push the bundle.
      - name: Build and Push image
        uses: docker/build-push-action@v6       
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/iamyasirhussain/devops-tracker:${{ github.sha }}

      # Write the new tag back to Git. ArgoCD picks it up from there.
      - name: Update deployment tag
        run: |
          sed -i "s|image: ghcr.io/iamyasirhussain/devops-tracker:.*|image: ghcr.io/iamyasirhussain/devops-tracker:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: deploy ${{ github.sha }} [skip ci]"
          git push
